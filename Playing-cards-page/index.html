<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Playing Cards</title>
    <link rel="stylesheet" href="CSS/styles.css">
</head>

<body>
    <main id=playing-cards>

        <div class="card">
            <div class="left">
                <div class="left-letter">A</div>
                <div class="left-symbol">♠</div>
            </div>
            <div class="middle">♠</div>
            <div class="right">
                <div class="right-letter">A</div>
                <div class="right-symbol">♠</div>
            </div>
        </div>

        <div class="card">
            <div class="left">
                <div class="left-letter">2</div>
                <div class="left-symbol">♣</div>
            </div>
            <div class="middle">
                <div class="symbol">♣</div>
                <div class="symbol">♣</div>
            </div>
            <div class="right">
                <div class="right-letter">2</div>
                <div class="right-symbol">♣</div>
            </div>
        </div>

        <div class="card red-card">
            <div class="left">
                <div class="left-letter">3</div>
                <div class="left-symbol">♥</div>
            </div>
            <div class="middle">
                <div class="symbol">♥</div>
                <div class="symbol">♥</div>
                <div class="symbol">♥</div>
            </div>
            <div class="right">
                <div class="right-letter">3</div>
                <div class="right-symbol">♥</div>
            </div>
        </div>

        <div class="card red-card">
            <div class="left">
                <div class="left-letter">4</div>
                <div class="left-symbol">♦</div>
            </div>
            <div class="middle two-two">
                <div class="symbol">♦</div>
                <div class="symbol">♦</div>
                <div class="symbol">♦</div>
                <div class="symbol">♦</div>
            </div>
            <div class="right">
                <div class="right-letter">4</div>
                <div class="right-symbol">♦</div>
            </div>
        </div>

    </main>
</body>

</html>
